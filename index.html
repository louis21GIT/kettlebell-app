<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lou's Kettlebell Two-a-Day</title>
<style>
:root{--bg:#12151a;--card:#1c2129;--card2:#232a35;--text:#e8ecf1;--dim:#9aa7b5;
--green:#3ecf8e;--yellow:#f2c94c;--red:#eb5757;--accent:#5aa9e6;--line:#2e3743}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding-bottom:70px}
header{padding:18px 16px 10px;text-align:center}
header h1{font-size:1.25rem;letter-spacing:.4px}
header p{color:var(--dim);font-size:.82rem;margin-top:4px}
.recov{display:flex;gap:8px;justify-content:center;margin:12px 0 4px}
.recov button{flex:0 0 auto;padding:8px 14px;border-radius:20px;border:1px solid var(--line);background:var(--card);color:var(--dim);font-size:.85rem;cursor:pointer}
.recov button.g.on{background:rgba(62,207,142,.18);border-color:var(--green);color:var(--green)}
.recov button.y.on{background:rgba(242,201,76,.15);border-color:var(--yellow);color:var(--yellow)}
.recov button.r.on{background:rgba(235,87,87,.15);border-color:var(--red);color:var(--red)}
#banner{margin:10px 16px;padding:10px 14px;border-radius:10px;font-size:.88rem;background:var(--card);border:1px solid var(--line);color:var(--dim);text-align:center}
nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--card);border-top:1px solid var(--line);z-index:5}
nav button{flex:1;padding:10px 2px 12px;background:none;border:none;color:var(--dim);font-size:.72rem;cursor:pointer}
nav button.on{color:var(--accent)}
nav button span{display:block;font-size:1.15rem;margin-bottom:2px}
main{max-width:640px;margin:0 auto;padding:0 14px}
.view{display:none}.view.on{display:block}
h2{font-size:1.02rem;margin:16px 2px 10px}
.sess-btn{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;color:var(--text);cursor:pointer;font-size:.95rem}
.sess-btn small{display:block;color:var(--dim);margin-top:3px;font-size:.8rem}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px}
.exrow{display:flex;gap:12px;align-items:flex-start;cursor:pointer}
.exrow img{width:110px;height:82px;object-fit:cover;border-radius:8px;background:#fff;flex:0 0 auto}
.exrow .t b{font-size:.95rem}
.exrow .t .reps{color:var(--accent);font-size:.83rem;margin-top:2px}
.exrow .t .cue{color:var(--dim);font-size:.8rem;margin-top:5px;line-height:1.35}
.detail{display:none;margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.card.open .detail{display:block}
.detail img{width:48%;border-radius:8px;background:#fff}
.detail .imgs{display:flex;gap:4%;margin-bottom:8px}
.detail ol{margin-left:18px;color:var(--dim);font-size:.82rem;line-height:1.45}
.detail ol li{margin-bottom:4px}
.note{color:var(--yellow);font-size:.78rem;margin-top:6px}
.timerbox{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:14px;margin:6px 0 14px;text-align:center}
.timerbox .big{font-size:2.4rem;font-variant-numeric:tabular-nums;margin:6px 0}
.timerbox .sub{color:var(--dim);font-size:.85rem}
.trow{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.trow button,select{padding:10px 16px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--text);font-size:.9rem;cursor:pointer}
.trow button.go{background:var(--green);border-color:var(--green);color:#0c281c;font-weight:600}
.trow button.stop{background:var(--red);border-color:var(--red);color:#fff}
.done-btn{display:block;width:100%;padding:13px;margin:6px 0 20px;border-radius:12px;border:none;background:var(--accent);color:#0d1b26;font-weight:600;font-size:.95rem;cursor:pointer}
.hist{color:var(--dim);font-size:.85rem;line-height:1.7}
.back{background:none;border:none;color:var(--accent);font-size:.9rem;padding:10px 0;cursor:pointer}
.pill{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.75rem;margin-left:6px}
.pill.g{background:rgba(62,207,142,.18);color:var(--green)}
.streak{font-size:.9rem;color:var(--dim);margin:4px 2px 14px}
.credit{color:var(--dim);font-size:.7rem;text-align:center;margin:26px 0 10px}
.credit a{color:var(--dim)}
</style>
</head>
<body>
<header>
  <h1>Kettlebell Two-a-Day</h1>
  <p>One 15kg bell. One easy session, one work session. Never two hard ones.</p>
</header>

<div class="recov" id="recov">
  <button class="g" onclick="setRec('g')">Green 67%+</button>
  <button class="y" onclick="setRec('y')">Yellow 34-66</button>
  <button class="r" onclick="setRec('r')">Red &lt;34</button>
</div>
<div id="banner"></div>

<main>
  <section class="view" id="v-today">
    <h2>Today</h2>
    <div id="today-plan"></div>
    <div class="streak" id="streak"></div>
    <h2>History</h2>
    <div class="hist" id="hist"></div>
  </section>

  <section class="view" id="v-sessions">
    <h2>Sessions</h2>
    <div id="sess-list"></div>
  </section>

  <section class="view" id="v-run">
    <button class="back" onclick="show('sessions')">&#8592; All sessions</button>
    <h2 id="run-title"></h2>
    <div id="run-timer"></div>
    <div id="run-ex"></div>
    <button class="done-btn" id="done-btn">Mark session complete</button>
  </section>

  <section class="view" id="v-lib">
    <h2>All exercises</h2>
    <div id="lib"></div>
    <p class="credit">Diagrams: <a href="https://github.com/yuhonas/free-exercise-db">free-exercise-db</a> (public domain)</p>
  </section>
</main>

<nav>
  <button id="n-today" onclick="show('today')"><span>&#9728;</span>Today</button>
  <button id="n-sessions" onclick="show('sessions')"><span>&#127947;</span>Sessions</button>
  <button id="n-lib" onclick="show('lib')"><span>&#128214;</span>Exercises</button>
</nav>

let cur="today", curSess=null, anims=[];

function show(v){
  cur=v;
  document.querySelectorAll(".view").forEach(e=>e.classList.remove("on"));
  document.querySelectorAll("nav button").forEach(e=>e.classList.remove("on"));
  document.getElementById("v-"+(v==="run"?"run":v)).classList.add("on");
  const nb=document.getElementById("n-"+v); if(nb) nb.classList.add("on");
  stopAllTimers();
}
function setRec(x){
  localStorage.setItem("kb_rec_"+today(), x);
  paintRec();
}
function paintRec(){
  const x=localStorage.getItem("kb_rec_"+today())||"";
  document.querySelectorAll("#recov button").forEach(b=>b.classList.remove("on"));
  if(x) document.querySelector("#recov ."+x).classList.add("on");
  document.getElementById("banner").textContent = x? BANNERS[x] : "Tap your Whoop recovery zone for today's guidance.";
}
function today(){ return new Date().toISOString().slice(0,10); }

function exCard(key, reps){
  const e=DB[key];
  return `<div class="card" onclick="this.classList.toggle('open')">
    <div class="exrow">
      <img data-ex="${key}" data-f="0" src="${e.frames[0]}" alt="${e.name}">
      <div class="t"><b>${e.name}</b>
        <div class="reps">${reps}</div>
        <div class="cue">${e.cue}</div>
      </div>
    </div>
    <div class="detail">
      <div class="imgs"><img src="${e.frames[0]}"><img src="${e.frames[1]}"></div>
      <ol>${e.instructions.map(i=>"<li>"+i+"</li>").join("")}</ol>
      ${e.note?`<div class="note">${e.note}</div>`:""}
    </div>
  </div>`;
}

function openSess(id){
  curSess=id;
  const s=SESSIONS[id];
  document.getElementById("run-title").textContent=s.title;
  document.getElementById("run-ex").innerHTML =
    `<p style="color:var(--dim);font-size:.85rem;margin-bottom:10px">${s.sub}</p>` +
    s.items.map(i=>exCard(i[0],i[1])).join("");
  document.getElementById("run-timer").innerHTML = TIMERS[s.timer]();
  document.getElementById("done-btn").onclick=()=>{ logDone(id); show("today"); };
  show("run"); startAnims();
}

/* ---------- timers ---------- */
let tInt=null, audio=null;
function beep(n=1,freq=880){
  if(!audio) audio=new (window.AudioContext||window.webkitAudioContext)();
  for(let i=0;i<n;i++){
    const o=audio.createOscillator(), g=audio.createGain();
    o.connect(g); g.connect(audio.destination);
    o.frequency.value=freq; g.gain.value=.25;
    const t=audio.currentTime+i*.28;
    o.start(t); o.stop(t+.18);
  }
}
function stopAllTimers(){ if(tInt){clearInterval(tInt);tInt=null;} }

      <div class="sub" id="ts">Pick minutes and press start</div>
      <div class="trow">
        <select id="emom-min"><option>5</option><option>6</option><option>7</option><option selected>8</option><option>9</option><option>10</option></select>
        <button class="go" onclick="emomStart()">Start</button>
        <button class="stop" onclick="stopAllTimers()">Stop</button>
      </div></div>`; },
  interval(){ return `<div class="timerbox">
      <div class="sub">Do 10 swings, then tap rest. Beeps when the next round starts.</div>
      <div class="big" id="tb">Round 1</div>
      <div class="sub" id="ts">&nbsp;</div>
      <div class="trow">
        <select id="int-rest"><option value="60" selected>60s rest</option><option value="50">50s rest</option><option value="40">40s rest</option></select>
        <button class="go" onclick="intRest()">Swings done, start rest</button>
        <button class="stop" onclick="intReset()">Reset</button>
      </div></div>`; },
  rest(){ return `<div class="timerbox">
      <div class="sub">Between rounds</div>
      <div class="big" id="tb">Round 1 of 3</div>
      <div class="sub" id="ts">&nbsp;</div>
      <div class="trow">
        <button class="go" onclick="restStart()">Round done, rest 90s</button>
      </div></div>`; }
};
function emomStart(){
  stopAllTimers();
  const mins=+document.getElementById("emom-min").value;
  let t=0; beep(2);
  paint();
  tInt=setInterval(()=>{ t++;
    if(t>=mins*60){ stopAllTimers(); beep(3,660);
      document.getElementById("tb").textContent="Done";
      document.getElementById("ts").textContent="Now the get-ups, slow and controlled"; return; }
    if(t%60===0) beep(2);
    paint();
  },1000);
  function paint(){
    const m=Math.floor(t/60), s=t%60;
    document.getElementById("tb").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
    document.getElementById("ts").textContent="Minute "+(m+1)+" of "+mins+" | swing at each beep";
  }
}
let intRound=1;
function intRest(){
  stopAllTimers();
  let r=+document.getElementById("int-rest").value;
  tInt=setInterval(()=>{ r--;
    document.getElementById("ts").textContent="Rest: "+r+"s";
    if(r<=0){ stopAllTimers(); intRound++; beep(2);
      document.getElementById("tb").textContent="Round "+intRound;
      document.getElementById("ts").textContent="Go: 10 swings"; }
  },1000);
}
function intReset(){ stopAllTimers(); intRound=1;
  document.getElementById("tb").textContent="Round 1";
  document.getElementById("ts").innerHTML="&nbsp;"; }
let cRound=1;
function restStart(){
  stopAllTimers();
  let r=90;
  tInt=setInterval(()=>{ r--;
    document.getElementById("ts").textContent="Rest: "+r+"s";
    if(r<=0){ stopAllTimers(); cRound=Math.min(cRound+1,3); beep(2);
      document.getElementById("tb").textContent="Round "+cRound+" of 3";
      document.getElementById("ts").textContent="Go"; }
  },1000);
}

/* ---------- animation of 2-frame diagrams ---------- */
function startAnims(){
  anims.forEach(a=>clearInterval(a)); anims=[];
  document.querySelectorAll("img[data-ex]").forEach(img=>{
    anims.push(setInterval(()=>{
      const k=img.dataset.ex, f=img.dataset.f==="0"?"1":"0";
      img.dataset.f=f; img.src=DB[k].frames[+f];
    },900));
  });
}

/* ---------- log ---------- */
function logDone(id){
  const log=JSON.parse(localStorage.getItem("kb_log")||"[]");
  log.push({d:new Date().toISOString(), s:SESSIONS[id].title});
  localStorage.setItem("kb_log",JSON.stringify(log));
  paintToday();
}
function paintToday(){
  const dow=new Date().getDay();
  const [amp,pmp]=WEEK[dow];
  const map={"AM Practice":"am","Circuit A":"ca","Circuit B":"cb","Swing Intervals":"int"};
  const btn=(label,slot)=> map[label]
    ? `<button class="sess-btn" onclick="openSess('${map[label]}')">${slot}: ${label}<small>Tap to start</small></button>`
    : `<button class="sess-btn" style="cursor:default">${slot}: ${label}<small>No bell needed</small></button>`;
  document.getElementById("today-plan").innerHTML=btn(amp,"AM")+btn(pmp,"PM");
  const log=JSON.parse(localStorage.getItem("kb_log")||"[]");
  const days=new Set(log.map(l=>l.d.slice(0,10)));
  let streak=0; let d=new Date();
  while(days.has(d.toISOString().slice(0,10))){ streak++; d.setDate(d.getDate()-1); }
  document.getElementById("streak").textContent =
    log.length? `${log.length} sessions logged. Current streak: ${streak} day${streak===1?"":"s"}.` : "No sessions logged yet. Today is a good day to start.";
  document.getElementById("hist").innerHTML =
    log.slice(-14).reverse().map(l=>`${l.d.slice(0,10)} &middot; ${l.s} <span class="pill g">done</span>`).join("<br>")||"Nothing yet.";
}
function paintSessions(){
  document.getElementById("sess-list").innerHTML=Object.entries(SESSIONS)
    .map(([id,s])=>`<button class="sess-btn" onclick="openSess('${id}')">${s.title}<small>${s.sub}</small></button>`).join("");
}
function paintLib(){
  document.getElementById("lib").innerHTML=Object.keys(DB).map(k=>exCard(k,"")).join("");
}

paintRec(); paintToday(); paintSessions(); paintLib(); show("today"); startAnims();
</script>
